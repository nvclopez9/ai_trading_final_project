[theme]
base = "dark"
primaryColor = "#2962FF"
backgroundColor = "#0E1117"
secondaryBackgroundColor = "#1A1F2B"
textColor = "#E6E9EF"
font = "sans serif"

[server]
headless = true

[browser]
gatherUsageStats = false

[logger]
# Silencia el ruido benigno tipo "missing ScriptRunContext! This warning can
# be ignored when running in bare mode", que Streamlit emite cuando su watcher
# importa módulos fuera del contexto del script. Usa "warning" si quieres ver
# avisos durante depuración.
level = "error"
